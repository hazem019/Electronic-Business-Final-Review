<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IS Strategy - Quiz Review</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
}
.container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 15px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
}
header {
    background: linear-gradient(135deg, #2c3e50, #4a6378);
    color: white;
    padding: 30px;
    text-align: center;
}
header h1 { font-size: 28px; margin-bottom: 8px; }
header p { opacity: 0.9; font-size: 14px; }
.controls {
    padding: 20px 30px;
    background: #f8f9fa;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
}
.controls select, .controls button {
    padding: 8px 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    background: white;
}
.controls button {
    background: #667eea;
    color: white;
    border: none;
    transition: background 0.2s;
}
.controls button:hover { background: #5568d3; }
.progress-bar {
    height: 8px;
    background: #e0e0e0;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #43cea2, #185a9d);
    transition: width 0.3s;
    width: 0%;
}
.stats {
    padding: 15px 30px;
    background: #f0f4f8;
    display: flex;
    justify-content: space-around;
    font-size: 14px;
    border-bottom: 1px solid #e0e0e0;
}
.stat-item { text-align: center; }
.stat-value { font-size: 20px; font-weight: bold; color: #2c3e50; }
.stat-label { color: #666; font-size: 12px; }
.question-container {
    padding: 30px;
    min-height: 400px;
}
.q-number {
    color: #667eea;
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 10px;
}
.q-type {
    display: inline-block;
    padding: 3px 10px;
    background: #667eea;
    color: white;
    border-radius: 12px;
    font-size: 11px;
    margin-left: 10px;
}
.q-text {
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 25px;
    color: #2c3e50;
    font-weight: 500;
}
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
    padding: 15px 20px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    text-align: left;
    font-size: 15px;
    line-height: 1.4;
}
.option:hover:not(:disabled) {
    border-color: #667eea;
    background: #f5f7ff;
    transform: translateX(5px);
}
.option:disabled { cursor: not-allowed; }
.option.correct {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
}
.option.wrong {
    background: #f8d7da;
    border-color: #dc3545;
    color: #721c24;
}
.option.show-correct {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
    font-weight: 600;
}
.feedback {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
}
.feedback.show { display: block; }
.feedback.correct {
    background: #d4edda;
    color: #155724;
    border-left: 4px solid #28a745;
}
.feedback.wrong {
    background: #f8d7da;
    color: #721c24;
    border-left: 4px solid #dc3545;
}
.navigation {
    padding: 20px 30px;
    background: #f8f9fa;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #e0e0e0;
}
.nav-btn {
    padding: 10px 25px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
}
.nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.nav-btn.prev { background: #6c757d; color: white; }
.nav-btn.next { background: #667eea; color: white; }
.nav-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.q-counter { font-weight: 600; color: #2c3e50; }
.tf-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
@media (max-width: 600px) {
    .tf-options { grid-template-columns: 1fr; }
    .stats { flex-wrap: wrap; gap: 10px; }
    header h1 { font-size: 22px; }
}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>📚 Information Systems Strategy</h1>
        <p>The Final Lecture: Comprehensive Review Quiz</p>
    </header>
    <div class="controls">
        <select id="filterSelect">
            <option value="all">All Questions</option>
            <option value="tf">True/False Only</option>
            <option value="mcq">Multiple Choice Only</option>
        </select>
        <button onclick="resetQuiz()">🔄 Reset Quiz</button>
        <button onclick="randomQuestion()">🎲 Random</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="answeredCount">0</div>
            <div class="stat-label">Answered</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="correctCount" style="color:#28a745;">0</div>
            <div class="stat-label">Correct</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="wrongCount" style="color:#dc3545;">0</div>
            <div class="stat-label">Wrong</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="scorePercent">0%</div>
            <div class="stat-label">Score</div>
        </div>
    </div>
    <div class="question-container" id="questionContainer"></div>
    <div class="navigation">
        <button class="nav-btn prev" id="prevBtn" onclick="prevQuestion()">← Previous</button>
        <span class="q-counter" id="qCounter">1 / 1</span>
        <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">Next →</button>
    </div>
</div>

<script>

let currentIndex = 0;
let userAnswers = {};
let filteredQuestions = [...questions];

function renderQuestion() {
    const q = filteredQuestions[currentIndex];
    if (!q) return;
    const container = document.getElementById('questionContainer');
    const globalIdx = questions.indexOf(q);
    const userAnswer = userAnswers[globalIdx];
    
    let optionsHTML = '';
    if (q.type === 'tf') {
        optionsHTML = `<div class="tf-options">
            <button class="option" data-val="true" onclick="selectAnswer(${globalIdx}, true)">✓ True</button>
            <button class="option" data-val="false" onclick="selectAnswer(${globalIdx}, false)">✗ False</button>
        </div>`;
    } else {
        optionsHTML = '<div class="options">' + q.options.map((opt, i) => 
            `<button class="option" data-val="${i}" onclick="selectAnswer(${globalIdx}, ${i})">${String.fromCharCode(97+i)}) ${opt}</button>`
        ).join('') + '</div>';
    }
    
    container.innerHTML = `
        <div class="q-number">Question ${currentIndex + 1} <span class="q-type">${q.type === 'tf' ? 'True/False' : 'Multiple Choice'}</span></div>
        <div class="q-text">${q.q}</div>
        ${optionsHTML}
        <div class="feedback" id="feedback"></div>
    `;
    
    if (userAnswer !== undefined) {
        showResult(globalIdx, userAnswer);
    }
    
    document.getElementById('qCounter').textContent = `${currentIndex + 1} / ${filteredQuestions.length}`;
    document.getElementById('prevBtn').disabled = currentIndex === 0;
    document.getElementById('nextBtn').disabled = currentIndex === filteredQuestions.length - 1;
    updateStats();
}

function selectAnswer(globalIdx, val) {
    if (userAnswers[globalIdx] !== undefined) return;
    userAnswers[globalIdx] = val;
    showResult(globalIdx, val);
    updateStats();
}

function showResult(globalIdx, val) {
    const q = questions[globalIdx];
    const isCorrect = (q.type === 'tf') ? (val === q.a) : (val === q.a);
    const buttons = document.querySelectorAll('.option');
    
    buttons.forEach(btn => {
        btn.disabled = true;
        const btnVal = btn.dataset.val;
        if (q.type === 'tf') {
            if (btnVal === String(q.a)) btn.classList.add('show-correct');
            if (btnVal === String(val) && val !== q.a) btn.classList.add('wrong');
        } else {
            if (parseInt(btnVal) === q.a) btn.classList.add('show-correct');
            if (parseInt(btnVal) === val && val !== q.a) btn.classList.add('wrong');
        }
    });
    
    const feedback = document.getElementById('feedback');
    feedback.classList.add('show', isCorrect ? 'correct' : 'wrong');
    let msg = isCorrect ? '✅ Correct!' : '❌ Incorrect.';
    if (q.type === 'tf') {
        msg += ` The correct answer is <strong>${q.a ? 'True' : 'False'}</strong>.`;
    } else {
        msg += ` The correct answer is <strong>${String.fromCharCode(97+q.a)}) ${q.options[q.a]}</strong>.`;
    }
    if (q.exp) msg += `<br><em>${q.exp}</em>`;
    feedback.innerHTML = msg;
}

function updateStats() {
    let correct = 0, wrong = 0;
    Object.keys(userAnswers).forEach(idx => {
        const q = questions[idx];
        if (userAnswers[idx] === q.a) correct++;
        else wrong++;
    });
    const total = correct + wrong;
    document.getElementById('answeredCount').textContent = total;
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
    document.getElementById('scorePercent').textContent = total > 0 ? Math.round((correct/total)*100) + '%' : '0%';
    document.getElementById('progressFill').style.width = ((currentIndex + 1) / filteredQuestions.length * 100) + '%';
}

function nextQuestion() {
    if (currentIndex < filteredQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
}

function resetQuiz() {
    if (confirm('Are you sure you want to reset all answers?')) {
        userAnswers = {};
        currentIndex = 0;
        renderQuestion();
    }
}

function randomQuestion() {
    currentIndex = Math.floor(Math.random() * filteredQuestions.length);
    renderQuestion();
}

document.getElementById('filterSelect').addEventListener('change', (e) => {
    const val = e.target.value;
    if (val === 'all') filteredQuestions = [...questions];
    else if (val === 'tf') filteredQuestions = questions.filter(q => q.type === 'tf');
    else filteredQuestions = questions.filter(q => q.type === 'mcq');
    currentIndex = 0;
    renderQuestion();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') nextQuestion();
    if (e.key === 'ArrowLeft') prevQuestion();
});

renderQuestion();
</script>
