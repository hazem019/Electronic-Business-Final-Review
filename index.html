// ═══════════════════════════════════════════
// Ch.1: E-Business Fundamentals — True/False
// ═══════════════════════════════════════════
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 1",question:"The digital shift in modern business has led the organization moved from paper-based methods to digital planning, execution and communication.",correct:"True"},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 2",question:"Financial inclusion is considered one of the recent developments associated with digital transformation in the Egyptian business environment.",correct:"True"},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 3",question:"A digital organization is characterized by fragmented electronic systems, non-virtual teams, and more administrative layers.",correct:"False",reason:"A digital organization is characterized by integrated e-systems, virtual teams and remote work, and fewer administrative layers."},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 4",question:"E-business refers to the integrated use of digital technology in buying and selling processes.",correct:"True"},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 5",question:"The concept of e-business includes five strategic pillars: infrastructure- information systems- connectivity - Human capital -innovation culture.",correct:"True"},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 6",question:"In traditional business, work can be performed remotely without spatial or temporal constraints.",correct:"False",reason:"Traditional business requires an on-site physical presence and face-to-face transactions. It is E-business that allows remote work without spatial or temporal constraints, providing 24/7 global reach."},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 7",question:"In e-business, the market scope is global, allowing access to international customers at any time.",correct:"True"},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 8",question:"E-business is characterized by Experience based decision making.",correct:"False",reason:"E-business is characterized by being Data-Driven, using integrated MIS to provide real-time data for precise decision-making. Traditional business is the one characterized by experience-based decision making."},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 9",question:"E-commerce is broader and more comprehensive than e-business.",correct:"False",reason:"E-business is the broader and more comprehensive holistic framework that includes all organizational functions. E-commerce is just a subset of E-business focused mainly on transactional and external activities (buying and selling)."},
{type:"tf",section:"Ch.1: E-Business Fundamentals",number:"Question 10",question:"The E-business has a cross functional integration where the E-commerce has a partial integration.",correct:"True"},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 11",question:"One of the strategic pillars of e-business is:",options:[{label:"a",text:"infrastructure"},{label:"b",text:"innovation culture"},{label:"c",text:"human capital"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The 5 strategic pillars of e-business are Infrastructure, Information Systems, Connectivity, Human Capital, and Innovation Culture."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 12",question:"E-business is characterized by:",options:[{label:"a",text:"A digital environment"},{label:"b",text:"A limited Reach"},{label:"c",text:"A Rigid structure"},{label:"d",text:"All of the above"}],correct:"a",explanation:"E-business operates in a digital and networked environment. Options B (Limited Reach) and C (Rigid Structure) are characteristics of a traditional physical business."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 13",question:"Traditional business is characterized by:",options:[{label:"a",text:"A physical environment"},{label:"b",text:"Limited reach"},{label:"c",text:"High Overhead"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Traditional business relies on a physical environment, is confined to local/regional markets (limited reach), and incurs high overhead costs due to heavy reliance on physical assets and labor."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 14",question:"The scope of e-business includes:",options:[{label:"a",text:"A hostlic scope covering all internal and external organizational functions"},{label:"b",text:"A scope limited to buying and selling transactions"},{label:"c",text:"A partial scope covering only internal functions"},{label:"d",text:"None of the above"}],correct:"a",explanation:"E-business has a holistic scope that includes all organizational functions (HR, Finance, Production) beyond just transactions, creating value for both internal and external stakeholders."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 15",question:"The first stage in the evolution of e-business is:",options:[{label:"a",text:"Internal IT use"},{label:"b",text:"Internet and communication"},{label:"c",text:"Electronic integration"},{label:"d",text:"Advanced E- Business"}],correct:"a",explanation:"The first development stage of E-business is \"Internal IT Use\", which focuses on operational efficiency like accounting and data storage with limited integration."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 16",question:"The third stage in the evolution of e-business is:",options:[{label:"a",text:"Internal IT use"},{label:"b",text:"Internet and communication"},{label:"c",text:"Electronic integration"},{label:"d",text:"Advanced E- Business"}],correct:"c",explanation:"The third stage is \"Electronic Integration\", where organizations adopt ERP, CRM, and SCM systems to create cross-functional data flow and improve decision-making."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 17",question:"The stage associated with the use of Artificial Intelligence tools in e-business is:",options:[{label:"a",text:"Internal IT use"},{label:"b",text:"Internet and communication"},{label:"c",text:"Electronic integration"},{label:"d",text:"Advanced E- Business"}],correct:"d",explanation:"The fourth stage, \"Advanced E-Business\", is characterized by strategic agility and the use of modern tools like Cloud, Mobile, Big Data, and AI (Artificial Intelligence)."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 18",question:"Tools such as Google Workspace are primarily used for:",options:[{label:"a",text:"Digital marketing"},{label:"b",text:"Customer Relationship Management (CRM)"},{label:"c",text:"Collaboration and teamwork"},{label:"d",text:"Financial Support"}],correct:"c",explanation:"In the modern digital ecosystem, tools like Google Workspace and Microsoft 365 are categorized specifically under \"Collaboration\"."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 19",question:"Tools such as SAP SuccessFactors are primarily used for:",options:[{label:"a",text:"Digital marketing"},{label:"b",text:"Human Resource Management (HRM)"},{label:"c",text:"Digital collaboration and teamwork"},{label:"d",text:"Financial analysis and support"}],correct:"b",explanation:"SAP SuccessFactors and Oracle HCM are specialized tools used for E-HRM (Electronic Human Resource Management) and talent management."},
{type:"mcq",section:"Ch.1: E-Business Fundamentals",number:"Question 20",question:"Tools such as Meta Ads Manager are primarily used for:",options:[{label:"a",text:"Digital marketing"},{label:"b",text:"Human Resource Management"},{label:"c",text:"Digital collaboration and teamwork"},{label:"d",text:"Financial analysis and support"}],correct:"a",explanation:"Meta Ads, Google Ads, and Analytics are the primary digital ecosystem tools used for Digital Marketing."},

// ═══════════════════════════════════════════════════
// Ch.2: Digital Value & Business Models — True/False
// ═══════════════════════════════════════════════════
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 1",question:"Digital value refers to the benefit obtained by the customer or the organization as a result of using digital technologies.",correct:"True"},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 2",question:"The use and analysis of data is considered one of the mechanisms for creating digital value.",correct:"True"},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 3",question:"In the direct online sales model, the organization acts as an intermediary between multiple parties such as sellers and buyers.",correct:"False",reason:"In the direct online sales model, organizations sell directly to customers without intermediaries. It is the \"Platform-Based\" model where the organization acts as a digital intermediary connecting multiple parties."},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 4",question:"In the freemium model, the organization provides free content or services to users and relies on advertising as the primary source of revenue.",correct:"False",reason:"The freemium model offers basic services for free to attract users, while advanced features require payment. Providing free content to users and generating revenue primarily through targeted advertising is the definition of the \"Advertising-Based\" model."},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 5",question:"In the subscription model, the organization provides a digital service or content in exchange for periodic or recurring fees.",correct:"True"},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 6",question:"The digital differentiation strategy relies on using technology and automation to reduce operational costs.",correct:"False",reason:"The strategy that relies on minimizing operational costs through automation to offer competitive pricing is called \"Digital Cost Leadership\". The \"Digital Differentiation\" strategy focuses on delivering distinctive digital value, quality, and superior customer experience regardless of price."},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 7",question:"The platform strategy is based on targeting a specific niche market.",correct:"False",reason:"Targeting a specific niche market with highly tailored digital solutions is the \"Digital Focus\" strategy. The \"Platform Strategy\" relies on orchestrating a digital ecosystem that facilitates interactions between multiple parties."},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 8",question:"The continuous innovation strategy focuses on building a multi-sided digital ecosystem that enables interaction between producers and consumers.",correct:"False",reason:"Building a digital ecosystem to enable interaction is the definition of the \"Platform Strategy\". The \"Continuous Innovation\" strategy prioritizes the ongoing evolution of products and early adoption of emerging tech based on data analysis."},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 9",question:"Focusing on customer experience is considered one of the success factors of e-business.",correct:"True"},
{type:"tf",section:"Ch.2: Digital Value & Business Models",number:"Question 10",question:"The low digital competition is considered one of the challenges of e-business.",correct:"False",reason:"The challenge is actually \"High Digital Competition\", as low barriers to entry in the digital environment create intense rivalry, requiring strong differentiation to survive."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 11",question:"One of the characteristics of digital value in e-business is:",options:[{label:"a",text:"Data Driven value"},{label:"b",text:"Personalization"},{label:"c",text:"Continuous interaction"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The key characteristics of digital value include being Data-Driven, offering Ubiquitous Access, Personalization, and Continuous Interaction between the organization and customers."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 12",question:"One of the mechanisms for creating digital value is:",options:[{label:"a",text:"Enhance customer experience"},{label:"b",text:"Digital advertising"},{label:"c",text:"Customer loyalty"},{label:"d",text:"All of the above"}],correct:"a",explanation:"According to the e-business framework, the four mechanisms for creating digital value are: 1. Use & Analysis of Data, 2. Deploy Digital Technologies, 3. Enhance Customer Experience, and 4. Achieve Operational Efficiency."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 13",question:"One of the components of the e-business model is:",options:[{label:"a",text:"Value proposition, physical environment, and customer experience"},{label:"b",text:"Digital channels, customer segments, and revenue streams"},{label:"c",text:"Key partners, cost structure, and revenue distribution"},{label:"d",text:"None of the above"}],correct:"b",explanation:"An E-Business Model consists of 9 core components, which include Digital Channels, Customer Segments, and Revenue Streams. (Option A is incorrect because \"physical environment\" belongs to traditional business)."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 14",question:"Uber is an example of:",options:[{label:"a",text:"Direct online sales model"},{label:"b",text:"Platform-based model"},{label:"c",text:"Subscription model"},{label:"d",text:"None of the above"}],correct:"b",explanation:"Uber acts as a digital intermediary connecting drivers with users, generating value via connection without owning the physical vehicles, making it a prime example of the Platform-Based model."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 15",question:"Spotify is an example of:",options:[{label:"a",text:"Subscription model"},{label:"b",text:"Freemium model"},{label:"c",text:"Advertising-based model"},{label:"d",text:"None of the above"}],correct:"b",explanation:"Spotify uses the Freemium model by offering free basic access with limits, while premium subscriptions unlock full features."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 16",question:"Relying on periodic service updates and rapid adoption of emerging technologies reflects:",options:[{label:"a",text:"Platform strategy"},{label:"b",text:"Continuous innovation strategy"},{label:"c",text:"Digital focus strategy"},{label:"d",text:"Digital differentiation strategy"}],correct:"b",explanation:"The Continuous Innovation strategy prioritizes ongoing evolution, data-informed improvement, periodic service updates, and the early adoption of emerging technologies."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 17",question:"Providing unique digital value that makes customers choose the organization based on quality and distinction refers to:",options:[{label:"a",text:"Platform strategy"},{label:"b",text:"Digital focus strategy"},{label:"c",text:"Digital innovation strategy"},{label:"d",text:"None of the above"}],correct:"d",explanation:"The correct term for this strategy is \"Digital Differentiation\". Since it is not listed among the choices (A, B, or C), \"None of the above\" is the strictly correct answer."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 18",question:"One of the success factors of e-business is:",options:[{label:"a",text:"Clear digital value"},{label:"b",text:"Effective technological infrastructure"},{label:"c",text:"Focus on customer experience"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Key success factors for E-Business include delivering Clear Digital Value, building a robust Technological Infrastructure, and focusing heavily on Customer Experience (CX)."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 19",question:"One of the success factors of e-business is:",options:[{label:"a",text:"High digital competition"},{label:"b",text:"Cybersecurity and data protection issues"},{label:"c",text:"Rapid technological change"},{label:"d",text:"None of the above"}],correct:"d",explanation:"Options A, B, and C are all considered major \"Challenges\" or barriers in e-business, not success factors. Therefore, none of the above is correct."},
{type:"mcq",section:"Ch.2: Digital Value & Business Models",number:"Question 20",question:"One of the challenges of e-business is:",options:[{label:"a",text:"High digital competition"},{label:"b",text:"Building digital trust"},{label:"c",text:"Rapid technological change"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The major challenges facing e-business are High Digital Competition, Cybersecurity, Building Trust, and keeping up with Rapid Technological Change."},

// ════════════════════════════════
// Ch.3: E-Commerce — True/False
// ════════════════════════════════
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 1",question:"E-commerce refers to conducting commercial activities related only to the exchange of goods and services through electronic means.",correct:"False",reason:"E-commerce goes beyond simple online selling; it involves the execution of commercial activities and transactions involving the exchange of goods, services, AND information through electronic means."},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 2",question:"The e-commerce process begins with order processing.",correct:"False",reason:"The e-commerce process begins with the \"Present\" stage (providing product information and specifications through the digital platform). Order processing is the second stage, called the \"Process\" stage."},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 3",question:"Alibaba.com is an example of Business-to-Consumer (B2C) e-commerce.",correct:"False",reason:"Alibaba.com is a global wholesale marketplace, which makes it an example of Business-to-Business (B2B) e-commerce. Amazon is the primary retail example for Business-to-Consumer (B2C)."},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 4",question:"Amazon is an example of Business-to-Consumer (B2C) e-commerce.",correct:"True"},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 5",question:"The Digital Egypt Portal is an example of Business-to-Government (B2G) e-commerce.",correct:"False",reason:"The Digital Egypt Portal provides government services and licenses directly to citizens, making it an example of Government-to-Consumer (G2C) e-commerce."},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 6",question:"One of the advantages of e-commerce is the reduction of operating costs.",correct:"True"},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 7",question:"One of the disadvantages of e-commerce is legal complexity.",correct:"True"},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 8",question:"A payment gateway refers to the technological intermediary between the consumer and the online store.",correct:"False",reason:"A payment gateway serves as the technological intermediary routing authorization requests and encrypting data between the merchant website and the banking system, not between the consumer and the online store."},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 9",question:"According to the electronic payment cycle, the authorization stage comes immediately after encryption.",correct:"False",reason:"According to the electronic payment cycle, the stage that comes immediately after Gateway Encryption & Request is \"Routing\" (the card network routes the authorization request to the issuing bank). Authorization happens after routing."},
{type:"tf",section:"Ch.3: E-Commerce",number:"Question 10",question:"One of the legal challenges facing e-commerce is the lack of recognition of electronic contracts in some countries.",correct:"True"},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 11",question:"The e-commerce process includes:",options:[{label:"a",text:"Product presentation"},{label:"b",text:"Order processing"},{label:"c",text:"Electronic payment"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The comprehensive e-commerce process flow consists of 5 stages: 1. Present (product presentation), 2. Process (order processing), 3. Pay (electronic payment), 4. Fulfill, and 5. Support. Therefore, all listed options are correct."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 12",question:"When companies provide services directly to individuals, this is considered:",options:[{label:"a",text:"B2B"},{label:"b",text:"B2G"},{label:"c",text:"B2E"},{label:"d",text:"None of the above"}],correct:"d",explanation:"Transactions conducted directly between companies and the final consumer are classified as Business-to-Consumer (B2C). Since B2C is not listed in options A, B, or C, the correct choice is None of the above."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 13",question:"When companies provide services to government entities, this is considered:",options:[{label:"a",text:"B2B"},{label:"b",text:"B2G"},{label:"c",text:"G2B"},{label:"d",text:"None of the above"}],correct:"b",explanation:"Commercial transactions conducted between private companies and government entities for tenders, bids, and public procurement are classified as Business-to-Government (B2G)."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 14",question:"When individuals provide services to companies through platforms such as Upwork, this is considered:",options:[{label:"a",text:"B2B"},{label:"b",text:"B2G"},{label:"c",text:"C2B"},{label:"d",text:"None of the above"}],correct:"c",explanation:"The Consumer-to-Business (C2B) model involves individuals offering value, freelance services, or crowdsourcing to business entities. Upwork is a primary example of this model."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 15",question:"One of the advantages of e-commerce is:",options:[{label:"a",text:"Geographic depth"},{label:"b",text:"Limited working hours"},{label:"c",text:"Speed of execution"},{label:"d",text:"All of the above"}],correct:"c",explanation:"Speed of execution is a major advantage, offering high flexibility to adjust prices and update inventory instantly. Option A is wrong because it provides geographic *expansion* (not depth), and B is wrong because it provides 24/7 availability (not limited hours)."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 16",question:"Components of e-commerce infrastructure include:",options:[{label:"a",text:"Technical infrastructure"},{label:"b",text:"Network and connectivity infrastructure"},{label:"c",text:"Electronic payment systems"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The infrastructure forming the backbone of digital commercial operations consists of 6 components: Technical Infrastructure, Network & Connectivity, Electronic Payment Systems, Database Management Systems, Security Systems, and Operational Integration."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 17",question:"According to the electronic payment cycle, the bank verifies the customer's balance and approves the transaction during the:",options:[{label:"a",text:"Encryption stage"},{label:"b",text:"Routing stage"},{label:"c",text:"Authorization stage"},{label:"d",text:"Fund Hold stage"}],correct:"c",explanation:"During the Authorization stage, the issuing bank verifies the card's validity and available balance, then approves or declines the transaction."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 18",question:"According to the electronic payment cycle, funds are transferred to the merchant's account after the:",options:[{label:"a",text:"Purchase stage"},{label:"b",text:"Authorization stage"},{label:"c",text:"Settlement stage"},{label:"d",text:"Routing stage"}],correct:"c",explanation:"Settlement is the final phase of the electronic payment cycle where funds are actually transferred to the merchant's account after clearing and fee deductions."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 19",question:"One of the legal and regulatory challenges of e-commerce is:",options:[{label:"a",text:"Consumer protection"},{label:"b",text:"Intellectual property"},{label:"c",text:"Privacy and data protection"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Digital compliance and cross-border regulations introduce several challenges, including Consumer Protection, Intellectual Property, Data Privacy (like GDPR), E-Contracts Recognition, and Taxation."},
{type:"mcq",section:"Ch.3: E-Commerce",number:"Question 20",question:"One of the disadvantages of e-commerce is:",options:[{label:"a",text:"Changing competition"},{label:"b",text:"Legal facilitation"},{label:"c",text:"High return rates"},{label:"d",text:"All of the above"}],correct:"c",explanation:"High return rates are a major operational disadvantage. The inability to try or inspect products beforehand leads to higher return volumes, which significantly increases reverse logistics costs."},

// ═══════════════════════════════
// Ch.4: E-Retailing — True/False
// ═══════════════════════════════
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 1",question:"The concept of E-Retailing is broader and more comprehensive than E-Commerce.",correct:"False",reason:"E-Commerce is the broader umbrella that encompasses multiple transaction types (B2B, C2C, G2C) and focuses on the infrastructure. E-Retailing is a specific, narrower concept that focuses only on the end-to-end customer experience for the final consumer."},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 2",question:"The concept of E-Retailing is more closely associated with electronic commerce models such as B2C and B2B.",correct:"False",reason:"The concept of E-Retailing is specifically associated with the B2C (Business-to-Consumer) model only, as it targets the final consumer. It does not target B2B (Business-to-Business)."},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 3",question:"In a standalone online store, the platform allows other sellers to display their products.",correct:"False",reason:"In a Standalone Store, a company owns its website and sells directly to consumers with full operational and brand control. Allowing other sellers to display their products is characteristic of an Online Marketplace or a Hybrid Model."},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 4",question:"In multi-vendor online marketplaces, the platform owns products that it sells directly to the final consumer.",correct:"False",reason:"An Online Marketplace acts as a platform intermediary connecting multiple sellers to buyers without owning physical assets or inventory. Owning the products directly is a characteristic of a Standalone Store."},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 5",question:"In the dropshipping model, the store does not keep physical inventory; instead, when an order is placed, the order details are sent to the supplier who ships the product directly to the customer.",correct:"True"},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 6",question:"Among the success factors of social commerce are visual content and High engagement.",correct:"True"},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 7",question:"It is preferable for companies to shift from an Omnichannel strategy to a Multichannel strategy.",correct:"False",reason:"It is preferable to shift from a Multichannel strategy (which has fragmented channels and disconnected data silos) to an Omnichannel strategy, which is the ultimate strategic goal for providing unified data and a seamless cross-channel customer journey."},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 8",question:"In dynamic pricing, prices are determined based on close monitoring of competitors in order to maintain market share.",correct:"False",reason:"Monitoring and matching competitor prices to protect market share is the definition of \"Competitive Pricing\". \"Dynamic Pricing\" refers to making real-time algorithmic adjustments based on market fluctuations and demand."},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 9",question:"The use of coupons, free shipping, and seasonal promotions refers to psychological pricing.",correct:"False",reason:"The use of coupons, free shipping thresholds, and limited-time offers is defined as \"Promotional Pricing\". \"Psychological Pricing\" leverages behavioral cues like charm pricing (e.g., $19.99) and scarcity cues (e.g., \"Only 2 left\")."},
{type:"tf",section:"Ch.4: E-Retailing",number:"Question 10",question:"Value-based pricing means setting the price based on the customer's perceived value.",correct:"True"},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 11",question:"One of the characteristics of a standalone online store is:",options:[{label:"a",text:"Rapid expansion in product assortment"},{label:"b",text:"Revenue from commissions and services"},{label:"c",text:"The company fully controls inventory management and brand"},{label:"d",text:"All of the above"}],correct:"c",explanation:"The primary characteristic of a standalone store is that the company owns its website/app and sells directly, allowing for full control over inventory, marketing, and the brand. Options A and B are characteristics of Marketplaces."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 12",question:"One of the characteristics of online marketplaces is:",options:[{label:"a",text:"Rapid expansion in product assortment"},{label:"b",text:"low inventory risk"},{label:"c",text:"dependent on seller"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Online marketplaces connect buyers and sellers, which allows for a high product assortment and low inventory risk. However, the customer experience is highly dependent on the quality of those third-party sellers."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 13",question:"One of the advantages of the dropshipping model is:",options:[{label:"a",text:"No need for large capital investment in inventory"},{label:"b",text:"Difficulty in controlling product quality"},{label:"c",text:"Customer experience depends on the supplier"},{label:"d",text:"None of the above"}],correct:"a",explanation:"Because the store takes orders but holds no stock, the main advantage is zero inventory risk and low capital requirement. Options B and C are disadvantages, not advantages."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 14",question:"One of the disadvantages of the dropshipping model is:",options:[{label:"a",text:"Difficulty in controlling product quality"},{label:"b",text:"Relatively low profit margins"},{label:"c",text:"Customer experience depends on the supplier"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Since suppliers ship directly to the customer, the store has less control over shipping speed and product quality. Additionally, because the store is essentially just an order-taker, it yields relatively low profit margins."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 15",question:"To achieve useability and navigation in the user experience on an e-commerce platform, there should be:",options:[{label:"a",text:"prominent \"add to cart\" actions"},{label:"b",text:"Auto suggest search engine"},{label:"c",text:"Advanced filters and clear categories"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Usability and Navigation (one of the six UX pillars) requires intuitive structures like advanced filtering, clear categories, auto-suggest search engines, and prominent \"Add to Cart\" buttons to reduce user friction."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 16",question:"One of the key factors for increasing the conversion rate and improving the customer experience is:",options:[{label:"a",text:"Personalization"},{label:"b",text:"checkout experience"},{label:"c",text:"post-purchase experience"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The six key pillars that drive conversion and customer loyalty include Personalization, Checkout Experience, and Post-Purchase experience, along with Usability, Speed, and Trust."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 17",question:"To protect market share, companies should follow:",options:[{label:"a",text:"psychological pricing"},{label:"b",text:"Dynamic pricing"},{label:"c",text:"Competitive pricing"},{label:"d",text:"None of the above"}],correct:"c",explanation:"Competitive Pricing relies on monitoring and matching (or slightly undercutting) competitor prices specifically to protect market share in transparent markets."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 18",question:"Using prices such as 9.99 or visually highlighting discounts refers to:",options:[{label:"a",text:"Psychological pricing"},{label:"b",text:"Dynamic pricing"},{label:"c",text:"Competitive pricing"},{label:"d",text:"None of the above"}],correct:"a",explanation:"Psychological Pricing leverages behavioral cues to influence the perception of value, such as using charm pricing (e.g., $19.99) or visually emphasizing discounts and scarcity."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 19",question:"Offering unique prices to specific customer segments based on their behavioral data and history refers to:",options:[{label:"a",text:"Promotional pricing"},{label:"b",text:"Personalized pricing"},{label:"c",text:"Value-based pricing"},{label:"d",text:"None of the above"}],correct:"b",explanation:"Personalized Pricing involves tailoring prices and loyalty-based special offers to individual segments based on their specific behavioral data and history."},
{type:"mcq",section:"Ch.4: E-Retailing",number:"Question 20",question:"Adjusting prices in real time based on algorithms that analyze market fluctuations refer to:",options:[{label:"a",text:"Value-based pricing"},{label:"b",text:"Dynamic pricing"},{label:"c",text:"Personalized pricing"},{label:"d",text:"All of the above"}],correct:"b",explanation:"Dynamic Pricing utilizes real-time algorithmic adjustments that respond to market fluctuations, seasonality, and demand to maximize revenue."},

// ═══════════════════════════════════════════
// Ch.5: Digital Transformation — True/False
// ═══════════════════════════════════════════
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 1",question:"The concept of digital transformation is limited to using digital technologies in operations without the need to redesign them.",correct:"False",reason:"Digital transformation is not simply about adopting new technologies; it requires a fundamental rethinking and redesigning of how businesses operate, their business models, and how they deliver value to customers."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 2",question:"Digitization means using digital technology and automating processes to improve efficiency within the organization.",correct:"False",reason:"Using digital technology and data to improve and automate existing business processes is the definition of \"Digitalization\". \"Digitization\" is only the process of converting information from physical formats into digital forms."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 3",question:"Digitalization refers to converting information from a physical form into a digital form.",correct:"False",reason:"Converting information from a physical form to a digital form (like scanning a paper to PDF) is called \"Digitization\". \"Digitalization\" involves automating and improving processes."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 4",question:"Digital transformation means completely redesigning the business model and creating new value using technology.",correct:"True"},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 5",question:"Technologies supporting digital transformation include cloud computing, big data analytics, artificial intelligence, and the Internet of Things.",correct:"True"},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 6",question:"The first stage of digital transformation is digital experimentation.",correct:"False",reason:"The first stage is \"Digital Awareness\", where leadership recognizes the strategic importance of digital technologies. \"Digital Experimentation\" is the second stage."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 7",question:"One of the challenges facing digital transformation in organizations is increasing digital skills and cybersecurity.",correct:"False",reason:"The actual challenges are the \"Lack of Digital Skills\" (shortage of talent) and the high \"Cybersecurity Risks\", not the increase of skills and security."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 8",question:"Using digital recruitment platforms and AI for screening is a form of digital transformation in marketing management.",correct:"False",reason:"Using digital recruitment platforms, AI screening, and e-learning are forms of digital transformation in Human Resource Management (HRM), not Marketing Management."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 9",question:"Digital transformation in operations management is not limited to introducing technology but also includes changing organizational culture and how daily tasks are executed.",correct:"True"},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 10",question:"ERP systems manage materials and core operations within an organization through multiple platforms and a decentralized database.",correct:"False",reason:"ERP systems connect various business functions into a single, cohesive system through a unified platform based on a \"Centralized Database\" (a single source of truth), not a decentralized one."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 11",question:"On-premise ERP operates via the internet and is characterized by high flexibility and speed.",correct:"False",reason:"Operating via the internet with high flexibility is the definition of \"Cloud ERP\". \"On-premise ERP\" is installed internally within the company, has high initial costs, and requires dedicated IT support."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 12",question:"Cloud ERP requires high initial costs, including purchasing licenses and hardware.",correct:"False",reason:"Cloud ERP is known for low initial costs because it provides resources over the internet without heavy infrastructure investment. High initial costs are characteristic of \"On-Premise ERP\"."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 13",question:"SAP systems are suitable for organizations seeking flexibility and rapid digital transformation through the cloud.",correct:"False",reason:"Flexibility and rapid, cloud-first digital transformation are the hallmarks of \"Oracle ERP\". \"SAP ERP\" is enterprise-grade, designed for deep integration and centralized control, and typically has a longer implementation time."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 14",question:"Oracle ERP is the best when the priority is centralized control and strict compliance with procedures.",correct:"False",reason:"When the priority is centralized control and deep enterprise-grade integration, \"SAP ERP\" is the best choice. Oracle ERP is favored for its modern flexibility, scalability, and fast implementation."},
{type:"tf",section:"Ch.5: Digital Transformation",number:"Question 15",question:"The digital transformation process in operations begins with choosing between cloud and on-premise solutions.",correct:"False",reason:"The first step in the implementation process is to \"Assess Readiness\" (analyze current processes and identify gaps). Choosing the model (Cloud vs. On-Premise) is the third step."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 16",question:"The process of converting information from a physical form to a digital form refers to:",options:[{label:"a",text:"Digitization"},{label:"b",text:"Digitalization"},{label:"c",text:"Digital Transformation"},{label:"d",text:"None of the above"}],correct:"a",explanation:"Digitization is simply changing the format from physical to digital (e.g., scanning a paper invoice into a PDF file). It does not change the actual business process."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 17",question:"Dimensions of digital transformation include:",options:[{label:"a",text:"Customer experience"},{label:"b",text:"Operational processes"},{label:"c",text:"Business models"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Digital technology reshapes an organization across three key dimensions: improving Customer Experience, redesigning Operational Processes, and developing entirely new Business Models."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 18",question:"Providing flexible and scalable IT resources for storing data and running applications over the internet refers to:",options:[{label:"a",text:"Cloud Computing"},{label:"b",text:"Artificial Intelligence"},{label:"c",text:"Internet of Things"},{label:"d",text:"Big Data Analytics"}],correct:"a",explanation:"Cloud Computing enables on-demand access to computing resources over the internet, providing scalability and cost-efficiency without the need for heavy physical infrastructure."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 19",question:"Connecting devices and equipment to the internet to collect real-time data and exchange information refers to:",options:[{label:"a",text:"Cloud Computing"},{label:"b",text:"Artificial Intelligence"},{label:"c",text:"Internet of Things"},{label:"d",text:"Big Data Analytics"}],correct:"c",explanation:"The Internet of Things (IoT) connects physical devices (like factory machines or sensors) to the internet, enabling real-time data collection, monitoring, and remote control."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 20",question:"The third stage of digital transformation is:",options:[{label:"a",text:"Digital Awareness"},{label:"b",text:"Digital Integration"},{label:"c",text:"Digital Experimentation"},{label:"d",text:"Full Transformation"}],correct:"b",explanation:"The stages in order are: 1. Digital Awareness, 2. Digital Experimentation, 3. Digital Integration (where technologies are scaled and integrated across departments), and 4. Full Digital Transformation."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 21",question:"Operational and strategic benefits of ERP include:",options:[{label:"a",text:"Improving operational efficiency"},{label:"b",text:"Reducing errors and duplication"},{label:"c",text:"Supporting digital transformation"},{label:"d",text:"All of the above"}],correct:"d",explanation:"ERP systems provide a single source of data, which eliminates duplication, reduces errors, improves operational efficiency, and serves as the backbone for continuous digital transformation."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 22",question:"A system that combines on-premise and cloud servers is:",options:[{label:"a",text:"On-Premise ERP"},{label:"b",text:"Cloud ERP"},{label:"c",text:"Hybrid ERP"},{label:"d",text:"None of the above"}],correct:"c",explanation:"Hybrid ERP combines both cloud and on-premise components, allowing complex organizations to balance data security with operational flexibility."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 23",question:"SAP systems are most suitable for:",options:[{label:"a",text:"Very large organizations"},{label:"b",text:"Medium organizations"},{label:"c",text:"Small organizations"},{label:"d",text:"All of the above"}],correct:"a",explanation:"SAP ERP is an enterprise-grade solution providing deep system integration and centralized control, making it extremely powerful and highly suitable for very large, complex enterprises."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 24",question:"Oracle ERP is characterized by:",options:[{label:"a",text:"Focus on cloud solutions"},{label:"b",text:"Suitable for rapidly growing organizations"},{label:"c",text:"Reduces the need for complex internal infrastructure"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Oracle ERP is a modern, cloud-first solution designed for high flexibility and fast implementation, making it perfect for rapidly growing businesses that want to avoid heavy internal infrastructure."},
{type:"mcq",section:"Ch.5: Digital Transformation",number:"Question 25",question:"The first step in digital transformation in operations is:",options:[{label:"a",text:"Defining requirements"},{label:"b",text:"Assessing readiness"},{label:"c",text:"Change management"},{label:"d",text:"Selecting the model"}],correct:"b",explanation:"The four sequential steps for successful implementation are: 1. Assess Readiness, 2. Define Requirements, 3. Select the Model, and 4. Change Management."},

// ══════════════════════════════════════
// Ch.6: Digital Marketing — True/False
// ══════════════════════════════════════
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 1",question:"Digital marketing communication channels include websites, social media, television, and newspapers.",correct:"False",reason:"Television and newspapers are traditional marketing channels. Digital marketing channels include websites, social media, email, and mobile apps."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 2",question:"Communication in traditional marketing is two-way, unlike digital marketing.",correct:"False",reason:"Communication in traditional marketing is strictly one-way. It is digital marketing that features two-way, interactive communication."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 3",question:"Digital marketing allows a precise audience targeting high costs.",correct:"False",reason:"Digital marketing allows for precise audience targeting with cost-effective (lower) costs. Traditional marketing is the one associated with broad targeting and higher costs."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 4",question:"Performance measurement in digital marketing is accurate and real-time.",correct:"True"},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 5",question:"Traditional marketing campaigns allow real-time measurement of results.",correct:"False",reason:"Traditional marketing offers limited and difficult-to-measure ROI. Real-time and accurate measurement is a key feature of digital marketing."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 6",question:"Search Engine Marketing (SEM) campaigns are paid, unlike Search Engine Optimization (SEO), which is considered free.",correct:"True"},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 7",question:"Social media marketing relies on the Pay-Per-Click (PPC) model.",correct:"False",reason:"It is Search Engine Marketing (SEM), such as Google Ads, that relies heavily on the Pay-Per-Click (PPC) model."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 8",question:"Social media marketing reaches customers with purchase intent, unlike search engine marketing.",correct:"False",reason:"Search Engine Marketing (SEM) is primarily what reaches customers with direct purchase intent based on their specific search queries, whereas social media marketing is more focused on building brand awareness and engagement."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 9",question:"On-page SEO includes reviews and external links (backlinks).",correct:"False",reason:"Reviews, ratings, and external links (backlinks) are elements of Off-Page SEO. On-Page SEO focuses on elements within the website itself, such as titles, keywords, and meta tags."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 10",question:"Macro influencers have between 10,000 and 100,000 followers.",correct:"False",reason:"Influencers with 10,000 to 100,000 followers are classified as \"Micro Influencers\". \"Macro Influencers\" have between 100,000 and 1,000,000 followers."},
{type:"tf",section:"Ch.6: Digital Marketing",number:"Question 11",question:"Credibility dimensions of influencers include trustworthiness and attractiveness.",correct:"True"},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 12",question:"One of the characteristics of digital marketing:",options:[{label:"a",text:"One-way communication"},{label:"b",text:"Difficulty measuring performance"},{label:"c",text:"Precise and flexible targeting"},{label:"d",text:"All of the above"}],correct:"c",explanation:"Digital marketing is characterized by precise and flexible targeting, two-way interactive communication, and real-time accurate measurement. Options A and B are characteristics of traditional marketing."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 13",question:"Digital marketing channels include:",options:[{label:"a",text:"Search Engine Marketing"},{label:"b",text:"Search Engine Optimization"},{label:"c",text:"Content Marketing"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The seven main channels of digital marketing include SEM, SEO, Content Marketing, Social Media Marketing, Email Marketing, Mobile Marketing, and Influencer Marketing."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 14",question:"Ads in social media marketing may appear through:",options:[{label:"a",text:"Search engines"},{label:"b",text:"Gmail and YouTube"},{label:"c",text:"Google Display Network"},{label:"d",text:"None of the above"}],correct:"d",explanation:"Search engines, Gmail, YouTube, and the Google Display Network are platforms used for Search Engine Marketing (SEM). Social media marketing relies on platforms like Facebook, Instagram, and LinkedIn."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 15",question:"Objectives of search engine marketing include:",options:[{label:"a",text:"Sales"},{label:"b",text:"Increasing awareness"},{label:"c",text:"Website traffic"},{label:"d",text:"All of the above"}],correct:"d",explanation:"The main objectives of paid Search Engine Marketing (SEM) campaigns include driving sales, generating leads, increasing website traffic, promoting apps, and building brand awareness."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 16",question:"Off-page SEO factors include:",options:[{label:"a",text:"Website speed"},{label:"b",text:"Website structure"},{label:"c",text:"Reviews and backlinks"},{label:"d",text:"All of the above"}],correct:"c",explanation:"Reviews and external links (backlinks) are the main factors in Off-Page SEO. Website speed and structure are part of Technical SEO."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 17",question:"Elements of effective content writing include:",options:[{label:"a",text:"Using storytelling"},{label:"b",text:"Including a call to action"},{label:"c",text:"provide real value"},{label:"d",text:"All of the above"}],correct:"d",explanation:"For content marketing to be effective, it must provide real value, utilize storytelling, and always include a clear call to action for the audience."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 18",question:"mobile marketing channels include:",options:[{label:"a",text:"In App Ads"},{label:"b",text:"Push Notifications"},{label:"c",text:"Contextual Trageting"},{label:"d",text:"All of the above"}],correct:"d",explanation:"Mobile marketing leverages multiple channels including In-App Advertisements, Push Notifications, SMS texts, and Contextual Targeting to reach users directly on their devices."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 19",question:"Criteria for selecting influencers include:",options:[{label:"a",text:"Trust"},{label:"b",text:"Engagement"},{label:"c",text:"Credibility"},{label:"d",text:"All of the above"}],correct:"d",explanation:"When selecting an influencer, brands must evaluate the trust they have with their followers, their engagement rate, and their overall content credibility."},
{type:"mcq",section:"Ch.6: Digital Marketing",number:"Question 20",question:"Micro influencers have followers ranging between:",options:[{label:"a",text:"1,000-10,000"},{label:"b",text:"10,000-100,000"},{label:"c",text:"100,000-1,000,000"},{label:"d",text:"None of the above"}],correct:"b",explanation:"Micro influencers are classified as having 10K to 100K followers. Nano is 1K-10K, Macro is 100K-1M, and Mega is 1M+."},

const essays=[
{num:"1",title:"Stages of E-Business Development",items:["Web Presence: A basic website that provides information only.","E-Commerce: Customers can interact, browse products, and place orders online.","E-Business: Full online transactions with payment systems.","Integration/Transformation: Integration of website operations with ERP, CRM, and Supply Chain systems."]},
{num:"2",title:"Components of the E-Business Model",items:["Value Proposition: The unique value offered to customers.","Revenue Model: How the business earns money.","Market Opportunity: The potential size and value of the market.","Competitive Environment: Existing competitors in the market.","Market Strategy: The plan to attract customers.","Management Team & Organization: The leadership and structure that run the business."]},
{num:"3",title:"Types of E-Business Models",items:["B2C (Business-to-Consumer): Businesses sell directly to consumers.","B2B (Business-to-Business): Businesses sell to other businesses.","C2C (Consumer-to-Consumer): Consumers sell to other consumers.","C2B (Consumer-to-Business): Individuals provide products or services to businesses.","G2C/B2G: Transactions involving government and citizens/businesses."]},
{num:"4",title:"E-Business Strategies",items:["Digital Differentiation: Unique value and customer experience. (Apple)","Digital Cost Leadership: Lower costs through efficiency. (Amazon)","Digital Focus: Targeting a niche market. (LinkedIn)","Platform Strategy: Connecting users and providers. (Uber)","Continuous Innovation: Ongoing product improvement. (Spotify)"]},
{num:"5",title:"Types of E-Commerce",items:["B2B (Business to Business): Commercial transactions between businesses.","B2C (Business to Consumer): Businesses sell directly to consumers.","C2C (Consumer to Consumer): Individuals sell to other individuals online.","B2G (Business to Government): Businesses provide goods or services to government agencies.","G2C (Government to Consumer): Government agencies provide online services to citizens.","C2B (Consumer to Business): Individuals offer services to businesses."]},
{num:"6",title:"E-Commerce Infrastructure",items:["Technical Infrastructure (TECH): The hardware and software that support e-commerce operations.","Network & Connectivity (NET): Internet and communication networks that enable data transfer.","Electronic Payment Systems (PAY): Systems that allow secure online payments.","Database Management Systems (DATA): Systems used to store and manage customer and product data.","Security Systems (SEC): Tools and measures that protect data and transactions.","Integration with Operations (INT): Connecting the e-commerce platform with inventory, accounting, and logistics systems."]},
{num:"7",title:"The Electronic Payment Cycle",items:["Initiate Payment: The customer enters payment details to start the transaction.","Encryption & Request: The payment information is encrypted and sent securely.","Routing: The payment request is routed to the issuing bank.","Authorization: The bank verifies the card and approves or declines the payment.","Fund Hold & Confirmation: The amount is reserved, and the merchant receives confirmation.","Settlement: The funds are transferred to the merchant's account."]},
{num:"8",title:"Types of E-Retailing Models",items:["Standalone Store: A company sells through its own website or app.","Online Marketplace: A platform that connects many sellers with buyers.","Hybrid Model: Combines selling the company's own products with third-party sellers' products.","Dropshipping: The store accepts orders but does not keep inventory.","Social Commerce: Selling directly through social media platforms."]},

let all=[],filtered=[],ci=0;

function init(){
all=Q.map((q,i)=>({...q,id:i,answered:false,selected:null,isCorrect:null}));
const chapters=[...new Set(Q.map(q=>q.section))];
const sel=document.getElementById("chapterFilter");
chapters.forEach(ch=>{const o=document.createElement("option");o.value=ch;o.textContent=ch;sel.appendChild(o)});
filtered=[...all];ci=0;updateStats();render();buildEssays();
}

function buildEssays(){
const c=document.getElementById("essayQuestionsContainer");
c.innerHTML=essays.map(e=>`
<div class="essay-card">
<span class="essay-q-number">Q${e.num}</span>
<div class="essay-q-title">${e.title}</div>
<div class="essay-content">
${e.items.map(item=>`<div class="essay-item">${item}</div>`).join("")}
</div>
</div>
`).join("");
}

function switchMode(m){
document.getElementById("quizContent").classList.toggle("hidden",m==="essay");
document.getElementById("essayContent").classList.toggle("hidden",m==="quiz");
document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
if(m==="quiz")document.getElementById("statsSection").classList.remove("hidden");
else document.getElementById("statsSection").classList.add("hidden");
}

function esc(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}
function rt(t){return esc(t).replace(/\n/g,"<br>")}

function render(){
const c=document.getElementById("questionCard");
if(!filtered.length){c.innerHTML='<div class="feedback wrong">No questions match your filters.</div>';return}
if(ci>=filtered.length)ci=filtered.length-1;
if(ci<0)ci=0;
const q=filtered[ci];
const tl=q.type==="tf"?"True / False":"MCQ";
const bc=q.type==="tf"?"badge-tf":"badge-mcq";
let ah="";
if(q.type==="tf"){
["True","False"].forEach(o=>{
let cls="answer-btn";
if(q.answered){if(o===q.correct)cls+=" correct";if(o===q.selected&&o!==q.correct)cls+=" wrong"}
ah+=`<button class="${cls}" onclick="answer('${o}')" ${q.answered?"disabled":""}>${o}</button>`;
});
}else{
q.options.forEach(o=>{
let cls="answer-btn";
if(q.answered){if(o.label===q.correct)cls+=" correct";if(o.label===q.selected&&o.label!==q.correct)cls+=" wrong"}
ah+=`<button class="${cls}" onclick="answer('${o.label}')" ${q.answered?"disabled":""}><strong>${esc(o.label).toUpperCase()})</strong> ${rt(o.text)}</button>`;
});
}
let fb="";
if(q.answered){
const ct=q.type==="tf"?q.correct:`${q.correct.toUpperCase()}) ${q.options.find(o=>o.label===q.correct).text}`;
fb=`<div class="feedback ${q.isCorrect?"correct":"wrong"}">${q.isCorrect?"✅ Correct!":"❌ Wrong."}<div class="detail">Correct Answer: ${rt(ct)}</div>${q.reason?`<div class="detail">Reason: ${rt(q.reason)}</div>`:""}${q.explanation?`<div class="detail">Explanation: ${rt(q.explanation)}</div>`:""}</div>`;
}
c.innerHTML=`<div class="q-header"><span class="badge ${bc}">${tl}</span><span class="badge badge-num">${ci+1} / ${filtered.length}</span></div><div class="section-label">${rt(q.section)} — ${rt(q.number)}</div><div class="q-text">${rt(q.question)}</div><div class="answers">${ah}</div>${fb}`;
updProg();
}

function answer(s){
const q=filtered[ci];if(!q||q.answered)return;
q.answered=true;q.selected=s;q.isCorrect=s===q.correct;
const o=all.find(x=>x.id===q.id);if(o){o.answered=q.answered;o.selected=q.selected;o.isCorrect=q.isCorrect}
updateStats();render();
}

function updateStats(){
const t=all.length,a=all.filter(q=>q.answered).length,co=all.filter(q=>q.isCorrect).length,p=a?Math.round(co/a*100):0;
document.getElementById("totalCount").textContent=t;
document.getElementById("answeredCount").textContent=a;
document.getElementById("scoreCount").textContent=co;
document.getElementById("percentCount").textContent=p+"%";
}

function updProg(){
const a=all.filter(q=>q.answered).length,t=all.length||1;
document.getElementById("progressBar").style.width=Math.round(a/t*100)+"%";
}

function next(){if(ci<filtered.length-1){ci++;render()}}
function prev(){if(ci>0){ci--;render()}}
function restart(){if(!confirm("Restart quiz and clear all answers?"))return;all.forEach(q=>{q.answered=false;q.selected=null;q.isCorrect=null});ci=0;applyFilters();updateStats();render()}

function applyFilters(){
const ch=document.getElementById("chapterFilter").value;
const tp=document.getElementById("typeFilter").value;
const st=document.getElementById("statusFilter").value;
filtered=all.filter(q=>{
const mc=ch==="all"||q.section===ch;
const mt=tp==="all"||q.type===tp;
let ms=true;
if(st==="unanswered")ms=!q.answered;
else if(st==="answered")ms=q.answered;
else if(st==="wrong")ms=q.isCorrect===false;
return mc&&mt&&ms;
});
ci=0;render();
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
