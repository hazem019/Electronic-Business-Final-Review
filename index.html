      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--text);
      line-height: 1.6;

  section: "Multiple Choice Questions",
  number: "Question 20",
  question: "If you have an activity with a Late Finish (LF) of 20 and a duration of 5, and it has an Early Start (ES) of 12. What is its Slack Time?",
  options: [

  correct: "c",
  explanation: "First, find the Late Start (LS): $LS = LF - \\text{Duration} = 20 - 5 = 15$. Then, Slack Time $= LS - ES = 15 - 12 = 3$. (Alternatively, $EF = 12 + 5 = 17$, Slack $= 20 - 17 = 3$)."

    ];

    let allQuestions = [];
    let filteredQuestions = [];
    let currentIndex = 0;

    function initializeQuiz() {
      allQuestions = questions.map((question, index) => ({
        ...question,
        id: index + 1,
        answered: false,
        selected: null,
        isCorrect: null
      }));

      filteredQuestions = [...allQuestions];
      currentIndex = 0;

      updateStats();
      renderQuestion();
    }

    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderText(text) {
      return escapeHTML(text).replace(/\n/g, "<br>");
    }

    function renderQuestion() {
      const container = document.getElementById("questionCard");

      if (filteredQuestions.length === 0) {
        container.innerHTML = `
          <div class="feedback wrong">
            No questions match your current filters.
          </div>
        `;
        return;
      }

      if (currentIndex >= filteredQuestions.length) {
        currentIndex = filteredQuestions.length - 1;
      }

      if (currentIndex < 0) {
        currentIndex = 0;
      }

      const q = filteredQuestions[currentIndex];
      const typeLabel = q.type === "tf" ? "True / False" : "MCQ";

      let answersHTML = "";

      if (q.type === "tf") {
        const tfOptions = ["True", "False"];

        answersHTML = tfOptions.map(option => {
          let className = "answer-btn";

          if (q.answered) {
            if (option === q.correct) className += " correct";
            if (option === q.selected && option !== q.correct) className += " wrong";
          }

          return `
            <button class="${className}" onclick="answerQuestion('${option}')" ${q.answered ? "disabled" : ""}>
              ${option}
            </button>
          `;
        }).join("");
      } else {
        answersHTML = q.options.map(option => {
          let className = "answer-btn";

          if (q.answered) {
            if (option.label === q.correct) className += " correct";
            if (option.label === q.selected && option.label !== q.correct) className += " wrong";
          }

          return `
            <button class="${className}" onclick="answerQuestion('${option.label}')" ${q.answered ? "disabled" : ""}>
              <strong>${escapeHTML(option.label)})</strong> ${renderText(option.text)}
            </button>
          `;
        }).join("");
      }

      let feedbackHTML = "";

      if (q.answered) {
        const correctText = q.type === "tf"
          ? q.correct
          : `${q.correct}) ${q.options.find(option => option.label === q.correct).text}`;

        feedbackHTML = `
          <div class="feedback ${q.isCorrect ? "correct" : "wrong"}">
            ${q.isCorrect ? "Correct!" : "Wrong."}
            <div class="detail">
              Correct Answer: ${renderText(correctText)}
            </div>
            ${q.reason ? `<div class="detail">Reason: ${renderText(q.reason)}</div>` : ""}
            ${q.explanation ? `<div class="detail">Explanation: ${renderText(q.explanation)}</div>` : ""}
          </div>
        `;
      }

      container.innerHTML = `
        <div class="question-top">
          <span class="badge">${typeLabel}</span>
          <span class="badge">Question ${currentIndex + 1} of ${filteredQuestions.length}</span>
        </div>

        <div class="section-title">${renderText(q.section)} - ${renderText(q.number)}</div>

        ${q.context ? `<pre class="context-table">${escapeHTML(q.context)}</pre>` : ""}

        <div class="question-text">
          ${renderText(q.question)}
        </div>

        <div class="answers">
          ${answersHTML}
        </div>

        ${feedbackHTML}
      `;

      updateProgress();
      typesetMath();
    }

    function answerQuestion(selected) {
      const q = filteredQuestions[currentIndex];

      if (!q || q.answered) return;

      q.answered = true;
      q.selected = selected;
      q.isCorrect = selected === q.correct;

      const original = allQuestions.find(item => item.id === q.id);

      if (original) {
        original.answered = q.answered;
        original.selected = q.selected;
        original.isCorrect = q.isCorrect;
      }

      updateStats();
      renderQuestion();
    }

    function updateStats() {
      const total = allQuestions.length;
      const answered = allQuestions.filter(q => q.answered).length;
      const correct = allQuestions.filter(q => q.isCorrect === true).length;
      const percent = answered === 0 ? 0 : Math.round((correct / answered) * 100);

      document.getElementById("totalCount").textContent = total;
      document.getElementById("answeredCount").textContent = answered;
      document.getElementById("scoreCount").textContent = correct;
      document.getElementById("percentCount").textContent = percent + "%";
    }

    function updateProgress() {
      const answered = allQuestions.filter(q => q.answered).length;
      const total = allQuestions.length || 1;
      const percent = Math.round((answered / total) * 100);

      document.getElementById("progressBar").style.width = percent + "%";
    }

    function nextQuestion() {
      if (currentIndex < filteredQuestions.length - 1) {
        currentIndex++;
        renderQuestion();
      }
    }

    function previousQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function restartQuiz() {
      if (!confirm("Restart the quiz and clear all answers?")) return;

      allQuestions.forEach(q => {
        q.answered = false;
        q.selected = null;
        q.isCorrect = null;
      });

      currentIndex = 0;
      applyFilters();
      updateStats();
      renderQuestion();
    }

    function applyFilters() {
      const search = "";
      const type = document.getElementById("typeFilter").value;
      const status = document.getElementById("statusFilter").value;

      filteredQuestions = allQuestions.filter(q => {
        const searchableText = [
          q.section,
          q.number,
          q.question,
          q.context || "",
          q.reason || "",
          q.explanation || "",
          ...(q.options ? q.options.map(option => option.text) : [])
        ].join(" ").toLowerCase();

        const matchesSearch = searchableText.includes(search);
        const matchesType = type === "all" || q.type === type;

        let matchesStatus = true;

        if (status === "unanswered") {
          matchesStatus = !q.answered;
        } else if (status === "answered") {
          matchesStatus = q.answered;
        } else if (status === "wrong") {
          matchesStatus = q.isCorrect === false;
        }

        return matchesSearch && matchesType && matchesStatus;
      });

      currentIndex = 0;
      renderQuestion();
    }

    function typesetMath() {
      if (window.MathJax && window.MathJax.typesetPromise) {
        window.MathJax.typesetPromise([document.getElementById("questionCard")]).catch(() => {});
      }
    }

    document.addEventListener("DOMContentLoaded", initializeQuiz);
  </script>
